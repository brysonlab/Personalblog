<!DOCTYPE html>
<html>
<head>
    <title>My Blog</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .post {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        a {
            text-decoration: none;
            color: black;
        }

        a:hover {
            color: #007bff;
        }

        small {
            color: gray;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>My Personal Blog 🚀</h1>

        {% for post in posts %}
            <div class="post">
                <h2>
                    <a href="/post/{{ post.id }}/">
                        {{ post.title }}
                    </a>
                </h2>
                <small>Posted on {{ post.created_at }}</small>
                <p>{{ post.content|truncatewords:30 }}</p>
            </div>
        {% endfor %}
    </div>

</body>
</html>
